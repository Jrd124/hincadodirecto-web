# ═══════════════════════════════════════════════════════════════════════
# Hincado ERP — Docker Compose (producción)
#
# Este archivo lo usa GitHub Actions (deploy-prod.yml) automáticamente.
# También se puede usar manualmente:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# IMPORTANTE:
#   - El .env DEBE existir en ./interfaz_facturas/.env en el servidor
#   - Los datos viven en el volumen "erp_erp-data" (NUNCA borrar)
#   - Caddy y ERP comparten la red "erp_web"
# ═══════════════════════════════════════════════════════════════════════

services:
  erp:
    image: ghcr.io/jrd124/hincado-erp:latest
    container_name: hincado-erp
    restart: unless-stopped
    env_file:
      - ./interfaz_facturas/.env
    volumes:
      - erp-data:/app/data
    expose:
      - "8000"
    networks:
      web:
        aliases:
          - erp

  caddy:
    image: caddy:2-alpine
    container_name: hincado-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - web
    depends_on:
      - erp

volumes:
  erp-data:
    external: true
    name: erp_erp-data
  caddy-data:
    external: true
    name: erp_caddy-data
  caddy-config:
    external: true
    name: erp_caddy-config

networks:
  web:
    external: true
    name: erp_web
