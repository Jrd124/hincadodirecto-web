# Nginx config para erp.hincadodirecto.com
# Colocar en: /etc/nginx/sites-available/hincado-erp
# Activar con: ln -s /etc/nginx/sites-available/hincado-erp /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name erp.hincadodirecto.com;
    # Certbot redirigirá esto a HTTPS automáticamente
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name erp.hincadodirecto.com;

    # SSL — certbot lo rellena automáticamente
    # ssl_certificate     /etc/letsencrypt/live/erp.hincadodirecto.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/erp.hincadodirecto.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Tamaño máximo de subida (facturas PDF, imágenes)
    client_max_body_size 50M;

    # Ficheros estáticos servidos directamente por nginx (más rápido)
    location /static/ {
        alias /opt/hincado-erp/interfaz_facturas/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Todo lo demás va a gunicorn
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
        proxy_connect_timeout 10;
    }
}
