<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HD | ERP</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    .error {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      color: #DC2626;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      margin-bottom: 20px;
      text-align: center;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#F1F5F9;">
    <div style="width:100%;max-width:380px;padding:20px;">
      <!-- Logo centrado -->
      <div style="text-align:center;margin-bottom:32px;">
        <img src="/static/assets/presupuestos/logo.jpg" alt="Hincado Directo" style="max-width:200px;height:auto;margin-bottom:12px;">
        <div style="font-size:14px;color:#64748B;letter-spacing:1px;">ERP | Gesti&oacute;n integral</div>
      </div>

      <!-- Card del formulario -->
      <div style="background:white;border-radius:12px;padding:32px;box-shadow:0 4px 24px rgba(0,0,0,0.08);">
        <h2 style="margin:0 0 4px;font-size:20px;font-weight:600;text-align:center;">Iniciar sesi&oacute;n</h2>
        <p style="margin:0 0 24px;font-size:13px;color:#64748B;text-align:center;">Introduce tus credenciales</p>

        <div id="error-msg" class="error" style="display:none;"></div>

        <form method="POST" action="/login">
          <div style="margin-bottom:16px;">
            <label style="display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:#374151;">Usuario</label>
            <input type="text" name="username" placeholder="Tu usuario" required autofocus autocomplete="username"
                   style="width:100%;padding:10px 14px;border:1px solid #D1D5DB;border-radius:8px;font-size:14px;box-sizing:border-box;outline:none;transition:border-color 0.15s;"
                   onfocus="this.style.borderColor='#2563EB'" onblur="this.style.borderColor='#D1D5DB'">
          </div>
          <div style="margin-bottom:24px;">
            <label style="display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:#374151;">Contrase&ntilde;a</label>
            <input type="password" name="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" required autocomplete="current-password"
                   style="width:100%;padding:10px 14px;border:1px solid #D1D5DB;border-radius:8px;font-size:14px;box-sizing:border-box;outline:none;transition:border-color 0.15s;"
                   onfocus="this.style.borderColor='#2563EB'" onblur="this.style.borderColor='#D1D5DB'">
          </div>
          <button type="submit"
                  style="width:100%;padding:12px;background:#2563EB;color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background 0.15s;"
                  onmouseover="this.style.background='#1D4ED8'" onmouseout="this.style.background='#2563EB'">
            Entrar
          </button>
        </form>
      </div>

      <p style="text-align:center;font-size:12px;color:#94A3B8;margin-top:20px;">Acceso restringido a usuarios autorizados</p>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get("error") === "1") {
      const el = document.getElementById("error-msg");
      el.innerHTML = "\u26A0 Usuario o contrase\u00F1a incorrectos.";
      el.style.display = "block";
    }
  </script>
</body>
</html>
