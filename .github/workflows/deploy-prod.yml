name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 46.225.27.219
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            cd /opt/hincado-erp
            git pull origin master
            docker compose up -d --build
            echo "Deploy complete: $(git log --oneline -1)"
